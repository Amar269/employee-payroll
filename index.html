<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Payroll</title>
     <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>

        <div class="header-container">
            <div class="logo-container">
                <img src="./assets/images/logo.png">
                  <div class="logo-text">
                      <span>EMPLOYEE</span>
                       <span>PAYROLL</span>
                    </div>
             

            </div>

        </div>
    </header>
    <main>

       <div class="main-container">
         <div class="form-container">
            <h2 class="form-title">Employee Payroll Form</h2>

                <div class="form-row">

                  <label for="name"> Name </label>
                  <input type="text" id="name" placeholder="Your name">
                  
                </div>

                <div class="row-content">

                   <label class="label text" for="profile">Profile Image</label>

                       <div class="profile-radio-content">

                         <label>
                            <input type="radio" name="profile" value="./assets/profile-images/Ellipse-1.png">
                               <img class="profile" src="./assets/images/profile-images/male avatar.jpg" alt="Profile 1">
                        </label>
                        <label>
                          <input type="radio" name="profile" value="./assets/profile-images/Ellipse-2.png">
                          <img class="profile" src="./assets/images/profile-images/female avatar.jpg" alt="Profile 2">
                        </label>
                        <label>
                           <input type="radio" name="profile" value="./assets/profile-images/Ellipse-3.png">
                           <img class="profile" src="./assets/images/profile-images/images.jpg" alt="Profile 3">
                        </label>


                </div>
                <br>
                <div class="row-content">
                   <label for="gender">Gender</label>
                 <div class="gender-content">
                      <label> <input type="radio" name="gender" value="Male">Male</label>
                      <label><input type="radio" name="gender" value="Female">Female</label>

                    </div>
                </div>
                <br>

                 <div class="row-content">
                     <label for="department">Department</label>
                       <div class="department-content">
                          <label><input type="checkbox" value="HR">HR </label>
                          <label> <input type="checkbox" value="Sales">Sales</label>
                          <label><input type="checkbox" value="Finance">Finance</label>
                          <label><input type="checkbox" value="Engineer">Engineer</label>
                          <label><input type="checkbox" value="Others">Others</label>
                        </div>
                 </div>
                <br>

                <div class="row-content">
                    <label for="salary">Salary</label>
                    <div class="salary-content">
                        <input type="range" id="salary" min="300000" max="500000" step="100" value="400000">
                        <output id="salary-output" >400000</output>
                    </div>
                </div>

         </div>
       </div>
    </main>
    
</body>
</html>
